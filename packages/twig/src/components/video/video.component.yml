video:
  namespace: Components/Media
  use: "@components/video/video.twig"
  label: Video
  description: A component for displaying a video, source from either a server or YouTube.
  fields:
    alt:
      type: string
      label: Alt
      description: alt text for the image
      required: true
      preview: "The ILO logo animates into view"
    caption:
      type: string
      label: Caption
      description: string
      preview: "The ILO brings together governments, employers and workers to set labour standards and promote decent work."
    url:
      type: object
      label: URL
      description: The image url(s), and at which breakpoint each should be displayed.
      required: true
      preview:
        - breakpoint: 0
          src: "/images/media-file-poster.jpg"
        - breakpoint: 800
          src: "/images/media-file-poster.jpg"
        - breakpoint: 1200
          src: "/images/media-file-poster.jpg"
        - breakpoint: 1440
          src: "/images/media-file-poster.jpg"
    video:
      type: object
      label: Video
      description: >-
        Video player settings. Keys: `src` (video URL); optional `tracks`, an
        array of caption/subtitle tracks shaped `{ src, srclang, label, kind,
        default }` (when present the CC button and on-screen captions are
        enabled); and a `controls` object of UI labels — `play`, `pause`,
        `volume`, `fullscreen`, plus the optional captions-menu labels
        `chooseSubtitlesText` (menu heading, defaults to "Choose subtitles")
        and `noCaptionsText` (the "captions off" option, defaults to "None").
        The two caption labels are applied as CSS custom properties, so they are
        only meaningful when `tracks` are supplied.
      required: true
      preview:
        controls:
          fullscreen: "Fullscreen"
          play: "Play"
          pause: "Pause"
          volume: "Volume"
        src: "/images/video-example.mp4"
        tracks: null
  variants:
    default:
      label: Default
    captioned:
      label: "With captions"
      description: "A server-sourced video with closed-caption (subtitle) tracks the viewer can switch between using the CC button."
      fields:
        video:
          controls:
            fullscreen: "Fullscreen"
            play: "Play"
            pause: "Pause"
            volume: "Volume"
            chooseSubtitlesText: "Choose subtitles"
            noCaptionsText: "None"
          src: "/images/video-example.mp4"
          tracks:
            - src: "/video-example.en.vtt"
              srclang: "en"
              label: "English"
              kind: "captions"
              default: true
            - src: "/video-example.es.vtt"
              srclang: "es"
              label: "Spanish"
              kind: "captions"

youtube_video:
  namespace: Components/Media
  use: "@components/video/video.twig"
  label: Youtube Video
  description: A component for displaying a video, source from YouTube.
  fields:
    alt:
      type: string
      label: Alt
      description: alt text for the image
      required: true
      preview: "The ILO logo animates into view"
    caption:
      type: string
      label: Caption
      description: string
      preview: "The ILO brings together governments, employers and workers to set labour standards and promote decent work."
    video:
      type: object
      label: Video
      description: video player settings
      required: true
      preview:
        controls:
          fullscreen: "Fullscreen"
          play: "Play"
          pause: "Pause"
          volume: "Volume"
        src: "https://www.youtube.com/watch?v=55xQTgUJqhQ&ab_channel=InternationalLabourOrganization"
        tracks: null
    vjsType:
      type: string
      label: Source Type
      description: The source type of video, required for youtube embedded videos
      required: false
      preview: "video/youtube"
  visibility: storybook
